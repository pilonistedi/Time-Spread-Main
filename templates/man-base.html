<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" />
    <title>{% block title %}{% endblock %}</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='output.css') }}"
    />
  </head>

  <body class="bg-black min-h-screen flex flex-col text-gray-300">
    <!-- HEADER -->
    <header
      class="w-full px-4 py-2 flex justify-between items-center border-b border-gray-600 sticky top-0 bg-black z-50"
    >
      <a href="{{ url_for('dashboard') }}">
        <h2 class="text-lg font-mono font-semibold text-orange-400">
          &copy; Time <span class="text-orange-500">Spread</span>
        </h2>
      </a>

      <!-- SEARCH -->
      <div class="flex items-center space-x-2">
        <input
          type="text"
          name="search"
          placeholder="Search tasks, notes or projects"
          class="w-72 p-2 text-sm border border-gray-600 rounded-md bg-gray-900 text-gray-200 focus:outline-none focus:ring-2 focus:ring-orange-500"
        />
        <button
          class="px-3 py-1 bg-orange-600 text-black rounded hover:bg-orange-500 transition text-sm"
        >
          Search
        </button>
        <button
          class="px-3 py-1 border border-orange-600 text-gray-200 rounded hover:bg-orange-500 transition text-sm"
        >
          Filter
        </button>
      </div>
    </header>

    <!-- NAVIGATION -->
    {% set current = request.endpoint %}

    <nav class="w-full flex justify-center space-x-2 mt-2">
      <a
        href="{{ url_for('task_manager') }}"
        class="w-28 rounded-md flex justify-center items-center text-sm transition {% if current == 'task_manager' %} bg-orange-600 text-black {% else %} border border-gray-600 text-orange-500 hover:bg-gray-800 {% endif %}"
      >
        Tasks
      </a>

      <a
        href="{{ url_for('notes_manager') }}"
        class="w-28 rounded-md flex justify-center items-center text-sm transition {% if current == 'notes_manager' %} bg-orange-600 text-black {% else %} border border-gray-600 text-orange-500 hover:bg-gray-800 {% endif %}"
      >
        Notes
      </a>

      <a
        href="{{ url_for('projects') }}"
        class="w-28 rounded-md flex justify-center items-center text-sm transition {% if current == 'projects' %} bg-orange-600 text-black {% else %} border border-gray-600 text-orange-500 hover:bg-gray-800 {% endif %}"
      >
        Projects
      </a>

      <a
        href="{{ url_for('logs') }}"
        class="w-28 rounded-md flex justify-center items-center text-sm transition {% if current == 'logs' %} bg-orange-600 text-black {% else %} border border-gray-600 text-orange-500 hover:bg-gray-800 {% endif %}"
      >
        Logs
      </a>
    </nav>

    <!-- PAGE CONTENT -->
    <main class="flex-1 w-full p-4 overflow-y-auto">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
